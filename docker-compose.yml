version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: taxaminer-backend
    volumes:
      - ./api:/app/api
      - data:/app/
    ports:
      - "5500:5500"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: taxaminer-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  data:
